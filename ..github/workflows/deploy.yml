name: EOHA Prototype CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ---- CHECKOUT CODE ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- SETUP NODE ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---- INSTALL DEPENDENCIES ----
      - name: Install dependencies
        run: npm ci

      # ---- BUILD PROJECT ----
      - name: Build project
        run: npm run build
        continue-on-error: false

      # ---- RUN TESTS ----
      - name: Run tests
        run: npm test

      # ---- DISCORD SUCCESS NOTIFICATION ----
      - name: Notify Discord (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"EOHA CI\",
            \"embeds\": [{
              \"title\": \"✅ CI Pipeline Successful\",
              \"description\": \"Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}\nTriggered by: ${{ github.actor }}\",
              \"color\": 3066993
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # ---- DISCORD FAILURE NOTIFICATION ----
      - name: Notify Discord (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"EOHA CI\",
            \"embeds\": [{
              \"title\": \"❌ CI Pipeline Failed\",
              \"description\": \"Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTriggered by: ${{ github.actor }}\",
              \"color\": 15158332
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
