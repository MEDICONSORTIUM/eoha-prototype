<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NCD Risk Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .controls {
    padding: 10px;
    background: #f8f9fa;
  }

  select {
    padding: 6px;
    margin-right: 10px;
  }

  #map {
    height: 600px;
    width: 100%;
  }
</style>
</head>
<body>

<div class="controls">
  <select id="country-select">
    <option value="">Select Country</option>
    <option value="South Africa">South Africa</option>
    <option value="Botswana">Botswana</option>
    <option value="Zimbabwe">Zimbabwe</option>
    <option value="Lesotho">Lesotho</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===================== MAP INIT =====================
const map = L.map("map").setView([0, 20], 3);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

// ===================== NCD RISK DATA =====================
const countryNcdRisk = {
  "South Africa": 58,
  "Botswana": 45,
  "Zimbabwe": 63,
  "Lesotho": 52
};

// ===================== COLOR SCALE =====================
function getCountryColor(risk) {
  if (risk >= 70) return "#d73027";
  if (risk >= 55) return "#fc8d59";
  if (risk >= 40) return "#fee08b";
  return "#91cf60";
}

// ===================== GEOJSON STYLE =====================
function countryStyle(feature) {
  const name = feature.properties.name;
  const risk = countryNcdRisk[name] || 0;

  return {
    fillColor: getCountryColor(risk),
    weight: 2,
    opacity: 1,
    color: "#00ffe0",     // glow outline
    fillOpacity: 0.5
  };
}

// ===================== HOVER EFFECT =====================
let africaLayer;

function highlightCountry(e) {
  const layer = e.target;
  layer.setStyle({
    weight: 4,
    color: "#00fff0",
    fillOpacity: 0.7
  });
  layer.bringToFront();
}

function resetHighlight(e) {
  africaLayer.resetStyle(e.target);
}

// ===================== ZOOM =====================
function zoomToCountry(layer) {
  map.fitBounds(layer.getBounds(), {
    padding: [20, 20]
  });
}

// ===================== COUNTRY EVENTS =====================
function onEachCountry(feature, layer) {
  const name = feature.properties.name;
  const risk = countryNcdRisk[name] ?? "No data";

  layer.on({
    mouseover: highlightCountry,
    mouseout: resetHighlight,
    click: () => zoomToCountry(layer)
  });

  layer.bindPopup(`
    <strong>${name}</strong><br/>
    Avg NCD Risk: ${risk}%
  `);
}

// ===================== LOAD AFRICA GEOJSON =====================
fetch("../data/africa-countries.geo.json")
  .then(res => res.json())
  .then(data => {
    africaLayer = L.geoJSON(data, {
      style: countryStyle,
      onEachFeature: onEachCountry
    }).addTo(map);
  });

// ===================== DROPDOWN → MAP SYNC =====================
const countrySelect = document.getElementById("country-select");

countrySelect.onchange = function () {
  const selected = this.value;
  if (!selected || !africaLayer) return;

  africaLayer.eachLayer(layer => {
    if (layer.feature.properties.name === selected) {
      zoomToCountry(layer);
      layer.openPopup();
    }
  });
};
</script>

</body>
</html>
